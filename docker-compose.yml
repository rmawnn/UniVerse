services:
  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-universe_db}
    ports:
      - "5433:5432"          # 5433 on host to avoid conflict with local PG
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override DB_HOST to use the Docker service name, not localhost
      DB_HOST: postgres
      DB_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    # Dev mode: mount source for hot-reload
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - /app/.pytest_cache
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Web (Next.js) ──────────────────────────────────────────
  web:
    build:
      context: ./web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # The browser calls the API, not the container, so this stays localhost
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    # Dev mode: mount source for HMR
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
