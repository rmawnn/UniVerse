name: Keep Alive

on:
  schedule:
    # Ping every 14 minutes to prevent Render free-tier cold starts
    # Render spins down after ~15 minutes of inactivity
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          curl -sf --max-time 30 https://api.universe-network.xyz/api/v1/health || echo "Backend ping failed (may be waking up)"
